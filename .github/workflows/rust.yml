name: CI

on:
  pull_request:
  push:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust tests
        run: cargo test --workspace --all-targets --verbose

  python-binding-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python binding tests
        run: cargo test -p vtracer --features python-binding --lib --verbose

  webapp-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build dist
        run: npm run build
      - name: Install Playwright browser
        run: npm run e2e:install-browser
      - name: Run E2E smoke test
        run: npm run test:e2e
