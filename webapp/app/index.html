<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>VTracer</title>
        <link rel="apple-touch-icon" sizes="192x192" href="./assets/apple-icon.png">
        <link rel="icon" type="image/png" sizes="192x192"  href="./assets/apple-icon.png">
        <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }
        .button {
            cursor: pointer;
            font-family: sans-serif;
            border-radius: 2px;
            border: 1px solid #aaa;
            padding: 4px 8px;
        }
        #droptext {
            border: 2px dashed #000;
        }
        #droptext.hovering {
            border: 2px dashed #fff;
        }
        #canvas-container {
            position: absolute;
            left: 2.5%;
            top: 5%;
            width: 95%;
            height: 90%;
        }
        #svg, #frame {
            position: absolute;
            width: 100%;
            margin-bottom: 50px;
        }
        #svg > path:hover {
            stroke: #ff0;
        }
        #droptext {
            height: 100%;
            text-align: center;
        }
        #options {
            position: absolute;
            left: 2.5%;
            top: 5%;
            padding: 50px;
            background: rgba(255,255,255,0.5);
        }
        </style>
    </head>

    <body>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <div>
            <div id="progressregion" style="display: none;">
                <progress id="progressbar" value="0" max="100" style="width: 98%;"></progress>
            </div>
            <div>
                <div id="drop">
                    <div id="canvas-container">
                        <div id="droptext">
                            <p>将图片拖到这里，或<a href="#" id="imageSelect">选择文件</a></p>
                        </div>
                        <canvas id="frame"></canvas>
                        <svg id="svg" version="1.1" xmlns="http://www.w3.org/2000/svg"></svg>
                    </div>
                </div>
            </div>
            <div id="options">
                <div>
                    <a class="button" id="export">下载为 SVG</a>    
                </div>

                <p></p>

                <div>
                    <div title="Algorithm for segmentation and grouping of pixel clusters">
                        聚类
                    </div>
                </div>

                <div>
                    <div>
                        <button id="clustering-binary" title="黑白（二值图）">黑白</button>
                        <button id="clustering-color" title="True 彩色 Image">彩色</button>
                    </div>
                </div>

                <div>
                    <div>
                        <button id="clustering-cutout" title="形状与其他区域不重叠">剪切</button>
                        <button id="clustering-stacked" title="形状按层叠放">叠层</button>
                    </div>
                </div>

                <div>
                    <div title="过滤面积小于 X 像素的色块">
                        噪点过滤 <span>（更干净）</span>
                    </div>
                </div>
                <div id="filterspecklevalue">
                    4
                </div>
                <div>
                    <input id="filterspeckle" type="range" min="1" max="16" step="1" value="4">
                </div>

                <div class="clustering-color-options">
                    <div title="每个 RGB 通道保留的有效位数">
                        颜色精度 <span>（更精确）</span>
                    </div>
                </div>
                <div id="colorprecisionvalue" class="clustering-color-options">
                    6
                </div>
                <div class="clustering-color-options">
                    <input id="colorprecision" type="range" min="1" max="8" step="1" value="6">
                </div>

                <div class="clustering-color-options">
                    <div title="渐变层之间的颜色差值">
                        渐变步长 <span>（层数更少）</span>
                    </div>
                </div>
                <div id="layerdifferencevalue" class="clustering-color-options">
                    16
                </div>
                <div class="clustering-color-options">
                    <input id="layerdifference" type="range" min="0" max="255" step="1" value="16">
                </div>

                <p></p>

                <div>
                    <div title="Algorithm for converting clusters to shapes">
                        曲线拟合
                    </div>
                </div>

                <div>
                    <div>
                        <button id="none" title="精确保留像素边界">像素</button>
                        <button id="polygon" title="简化为多边形">多边形</button>
                        <button id="spline" class="selected" title="平滑并拟合曲线">样条</button>
                    </div>
                </div>

                <div class="spline-options">
                    <div title="判定为拐角的最小瞬时角度（度，平滑后仍保留）">
                        拐角阈值 <span>（更平滑）</span>
                    </div>
                </div>
                <div id="cornervalue" class="spline-options">
                    60
                </div>
                <div class="spline-options">
                    <input id="corner" type="range" min="0" max="180" step="1" value="60">
                </div>

                <div class="spline-options">
                    <div title="迭代细分平滑，直到所有线段短于该长度">
                        线段长度 <span>（更粗略）</span>
                    </div>
                </div>
                <div id="lengthvalue" class="spline-options">
                    4
                </div>
                <div class="spline-options">
                    <input id="length" type="range" min="3.5" max="10" step="0.5" value="4">
                </div>

                <div class="spline-options">
                    <div title="判定为曲线切分点的最小角位移（度）">
                        拼接阈值 <span>（更精确）</span>
                    </div>
                </div>
                <div id="splicevalue" class="spline-options">
                    45
                </div>
                <div class="spline-options">
                    <input id="splice" type="range" min="0" max="180" step="1" value="45">
                </div>
                
                <div style="display: none">
                <div class="spline-options">
                    <div title="SVG 路径字符串小数位数">
                        路径精度 <span>（更多位数）</span>
                    </div>
                </div>
                <div id="pathprecisionvalue" class="spline-options">
                    8
                </div>
                <div class="spline-options">
                    <input id="pathprecision" class="uk-range" type="range" min="0" max="16" step="1" value="8">
                </div>
                </div>
            </div>
        </div>
        <script src="./bootstrap.js"></script>
    </body>
</html>
